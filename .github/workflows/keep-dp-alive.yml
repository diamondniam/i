name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every Monday and Thursday
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_server_time" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"